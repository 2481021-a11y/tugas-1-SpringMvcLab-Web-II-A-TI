<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['DM Serif Display', 'serif'],
                    },
                    keyframes: {
                        fadeUp: {
                            '0%':   { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: { 'fade-up': 'fadeUp .45s ease both' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'DM Serif Display', serif; }
        tr { transition: background .18s; }
        tr:hover td { background: rgba(232,93,38,.04) !important; }
    </style>
</head>
<body class="bg-amber-50 min-h-screen">

<!-- Navbar -->
<nav style="background:#0f1c2e; border-bottom:3px solid #e85d26;" class="sticky top-0 z-50 shadow-xl">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
        <a th:href="@{/}" class="font-display text-white text-xl flex items-center gap-2">
            <span style="color:#e85d26;">◈</span> Spring MVC Lab
        </a>
        <div class="flex gap-5 text-sm font-semibold text-white/60">
            <a th:href="@{/products}" class="hover:text-white transition-colors">Produk</a>
            <a th:href="@{/about}" class="hover:text-white transition-colors">Tentang</a>
        </div>
    </div>
</nav>

<div class="max-w-5xl mx-auto px-6 pt-8 pb-16 animate-fade-up">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
            <h1 class="font-display text-3xl text-gray-900" th:text="${title}">Judul</h1>
            <p class="text-sm text-gray-400 mt-1">
                Menampilkan
                <strong style="color:#e85d26;" th:text="${totalProducts}">0</strong>
                produk
            </p>
        </div>

        <!-- Search Form -->
        <form th:action="@{/products/search}" method="get">
            <div class="flex overflow-hidden rounded-xl shadow-sm border border-gray-200 bg-white" style="max-width:340px;">
                <input type="text" name="keyword"
                       class="flex-1 px-4 py-2.5 text-sm text-gray-700 outline-none bg-transparent placeholder-gray-400"
                       placeholder="Cari produk..."
                       th:value="${keyword}">
                <button type="submit"
                        class="px-4 py-2.5 text-sm font-semibold text-white transition-colors"
                        style="background:#e85d26;"
                        onmouseover="this.style.background='#ff7a45'" onmouseout="this.style.background='#e85d26'">
                    Cari
                </button>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div th:if="${!products.isEmpty()}" class="bg-white rounded-2xl shadow-md overflow-hidden border border-amber-100">
        <table class="w-full text-sm">
            <thead>
            <tr style="background:#0f1c2e;">
                <th class="text-left px-5 py-3.5 text-xs font-bold uppercase tracking-widest text-white/70 w-12">No</th>
                <th class="text-left px-5 py-3.5 text-xs font-bold uppercase tracking-widest text-white/70">Nama Produk</th>
                <th class="text-left px-5 py-3.5 text-xs font-bold uppercase tracking-widest text-white/70">Kategori</th>
                <th class="text-left px-5 py-3.5 text-xs font-bold uppercase tracking-widest text-white/70">Harga</th>
                <th class="text-left px-5 py-3.5 text-xs font-bold uppercase tracking-widest text-white/70">Stok</th>
                <th class="px-5 py-3.5 text-xs font-bold uppercase tracking-widest text-white/70">Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product, iterStat : ${products}"
                th:class="${iterStat.odd} ? 'bg-amber-50/40' : 'bg-white'">
                <td class="px-5 py-3.5 text-gray-400 font-semibold" th:text="${iterStat.count}">1</td>
                <td class="px-5 py-3.5 font-semibold text-gray-800" th:text="${product.name}">Nama</td>
                <td class="px-5 py-3.5">
                    <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                       th:text="${product.category}"
                       class="inline-block text-xs font-bold px-2.5 py-1 rounded-full transition-all"
                       style="background:rgba(232,93,38,.1); color:#e85d26;"
                       onmouseover="this.style.background='#e85d26'; this.style.color='white';"
                       onmouseout="this.style.background='rgba(232,93,38,.1)'; this.style.color='#e85d26';">
                        Kategori
                    </a>
                </td>
                <td class="px-5 py-3.5 text-gray-700 font-medium"
                    th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                    Rp 0
                </td>
                <td class="px-5 py-3.5">
                    <span th:text="${product.stock}"
                          th:class="${product.stock < 20}
                            ? 'inline-block px-2 py-0.5 rounded text-xs font-bold bg-red-100 text-red-600'
                            : 'text-gray-700 font-medium'">
                        0
                    </span>
                </td>
                <td class="px-5 py-3.5 text-center">
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       class="inline-block text-xs font-bold px-3 py-1.5 rounded-lg text-white transition-all shadow-sm"
                       style="background:#0284c7;"
                       onmouseover="this.style.background='#0369a1'; this.style.transform='translateY(-1px)';"
                       onmouseout="this.style.background='#0284c7'; this.style.transform='translateY(0)';">
                        Detail
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty state -->
    <div th:if="${products.isEmpty()}"
         class="bg-white rounded-2xl shadow-sm border border-amber-100 p-12 text-center">
        <div class="text-5xl mb-4">🔍</div>
        <p class="font-display text-xl text-gray-600">Produk tidak ditemukan</p>
        <p class="text-sm text-gray-400 mt-1">Coba kata kunci yang berbeda</p>
    </div>

    <!-- Navigation -->
    <div class="flex gap-3 mt-6">
        <a th:href="@{/}"
           class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-white shadow-sm transition-all"
           style="background:#0f1c2e;"
           onmouseover="this.style.background='#1a2f4a'" onmouseout="this.style.background='#0f1c2e'">
            ← Home
        </a>
        <a th:href="@{/products}"
           class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-all border-2"
           style="border-color:#e85d26; color:#e85d26;"
           onmouseover="this.style.background='#e85d26'; this.style.color='white';"
           onmouseout="this.style.background='transparent'; this.style.color='#e85d26';">
            Semua Produk
        </a>
    </div>
</div>

</body>
</html>
