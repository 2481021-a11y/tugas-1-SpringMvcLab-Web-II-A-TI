<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Greeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['DM Serif Display', 'serif'],
                    },
                    keyframes: {
                        fadeUp:  { '0%': { opacity:'0', transform:'translateY(24px)' }, '100%': { opacity:'1', transform:'translateY(0)' } },
                        shimmer: { '0%,100%': { backgroundPosition:'0% 50%' }, '50%': { backgroundPosition:'100% 50%' } },
                    },
                    animation: {
                        'fade-up': 'fadeUp .5s ease both',
                        'shimmer': 'shimmer 4s ease infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'DM Serif Display', serif; }
        .greeting-text {
            background: linear-gradient(90deg, #e85d26, #f0a500, #e85d26);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease infinite;
        }
    </style>
</head>
<body class="bg-amber-50 min-h-screen flex flex-col">

<!-- Navbar -->
<nav style="background:#0f1c2e; border-bottom:3px solid #e85d26;" class="sticky top-0 z-50 shadow-xl">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center">
        <a href="/" class="font-display text-white text-xl flex items-center gap-2">
            <span style="color:#e85d26;">◈</span> Spring MVC Lab
        </a>
    </div>
</nav>

<!-- Main content centered -->
<div class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="text-center max-w-lg animate-fade-up">

        <!-- Icon -->
        <div class="w-20 h-20 mx-auto mb-6 rounded-3xl flex items-center justify-center text-4xl shadow-xl"
             style="background:linear-gradient(135deg, #0f1c2e, #1a2f4a);">
            👋
        </div>

        <!-- Greeting -->
        <h1 class="font-display greeting-text mb-4"
            style="font-size: clamp(2.2rem, 6vw, 3.5rem); line-height:1.15;"
            th:text="${greeting}">
            Halo, Selamat Datang!
        </h1>

        <p class="text-gray-400 text-sm mb-8">Senang bertemu dengan Anda di aplikasi ini.</p>

        <!-- CTA -->
        <a href="/"
           class="inline-flex items-center gap-2 px-6 py-3 rounded-2xl text-sm font-bold text-white shadow-lg transition-all"
           style="background:#0f1c2e;"
           onmouseover="this.style.background='#1a2f4a'; this.style.transform='translateY(-2px)';"
           onmouseout="this.style.background='#0f1c2e'; this.style.transform='translateY(0)';">
            ← Kembali ke Home
        </a>
    </div>
</div>

</body>
</html>
