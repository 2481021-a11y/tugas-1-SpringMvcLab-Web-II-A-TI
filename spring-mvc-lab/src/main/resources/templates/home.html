<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['DM Serif Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#fff4ee',
                            100: '#ffe3cc',
                            500: '#e85d26',
                            600: '#cf4d1a',
                            700: '#a83c12',
                        },
                        navy: {
                            800: '#1a2f4a',
                            900: '#0f1c2e',
                        }
                    },
                    keyframes: {
                        fadeUp: {
                            '0%':   { opacity: '0', transform: 'translateY(24px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        'fade-up': 'fadeUp .5s ease both',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'DM Serif Display', serif; }
        .hero-glow::after {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(232,93,38,.4) 0%, transparent 70%);
            pointer-events: none;
        }
        .nav-link { transition: color .2s; }
        .nav-link:hover { color: #e85d26; }
        .btn-cat {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 0.5rem 1.1rem;
            border-radius: 9999px;
            font-weight: 600; font-size: 0.85rem; letter-spacing: .03em;
            transition: all .22s cubic-bezier(.4,0,.2,1);
            border: 2px solid rgba(255,255,255,.3);
            color: rgba(255,255,255,.85);
            background: rgba(255,255,255,.07);
        }
        .btn-cat:hover {
            border-color: white;
            background: rgba(255,255,255,.18);
            color: white;
            transform: translateY(-2px);
        }
        .btn-main {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 0.65rem 1.6rem;
            border-radius: 9999px;
            font-weight: 700; font-size: 0.9rem; letter-spacing: .04em;
            background: #e85d26;
            color: white;
            box-shadow: 0 6px 20px rgba(232,93,38,.4);
            transition: all .22s cubic-bezier(.4,0,.2,1);
        }
        .btn-main:hover {
            background: #ff7a45;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(232,93,38,.5);
        }
    </style>
</head>
<body class="bg-amber-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-navy-900 sticky top-0 z-50 border-b-4 border-brand-500 shadow-xl" style="background:#0f1c2e; border-bottom:3px solid #e85d26;">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
        <a th:href="@{/}" class="font-display text-white text-xl flex items-center gap-2">
            <span class="text-brand-500 text-lg">◈</span>
            <span th:text="${title}">App Name</span>
        </a>
        <div class="flex items-center gap-6 text-sm font-semibold">
            <a th:href="@{/products}" class="text-white/70 nav-link">Produk</a>
            <a th:href="@{/about}" class="text-white/70 nav-link">Tentang</a>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="max-w-5xl mx-auto px-6 pt-10 pb-16 animate-fade-up">
    <div class="relative overflow-hidden rounded-3xl shadow-2xl hero-glow"
         style="background: linear-gradient(135deg, #0f1c2e 0%, #1a2f4a 55%, #1e3a5a 100%); padding: 3.5rem;">

        <!-- Decorative circles -->
        <div class="absolute bottom-0 left-0 w-48 h-48 rounded-full opacity-10"
             style="background: radial-gradient(circle, #f0a500, transparent); transform: translate(-30%, 40%);"></div>

        <div class="relative z-10 max-w-xl">
            <span class="inline-block text-brand-500 text-xs font-bold uppercase tracking-widest mb-3 bg-brand-500/10 px-3 py-1 rounded-full border border-brand-500/30">
                🛍 Toko Online
            </span>
            <h1 class="font-display text-white mb-4" style="font-size:clamp(2rem,5vw,3rem); line-height:1.2;" th:text="${title}">Judul</h1>
            <p class="text-white/70 text-base mb-8 leading-relaxed" th:text="${description}">Deskripsi aplikasi</p>

            <div class="flex flex-wrap gap-3 items-center">
                <a th:href="@{/products}" class="btn-main">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    Daftar Produk
                </a>
                <div class="w-px h-6 bg-white/20 mx-1"></div>
                <a th:href="@{/products/category/Elektronik}" class="btn-cat">📱 Elektronik</a>
                <a th:href="@{/products/category/Buku}" class="btn-cat">📚 Buku</a>
                <a th:href="@{/products/category/Makanan}" class="btn-cat">🍱 Makanan</a>
            </div>
        </div>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-3 gap-4 mt-6">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-amber-100 text-center">
            <div class="font-display text-3xl" style="color:#e85d26;">📱</div>
            <div class="font-bold text-gray-800 mt-1">Elektronik</div>
            <div class="text-xs text-gray-400 mt-0.5">Gadget & Aksesoris</div>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-amber-100 text-center">
            <div class="font-display text-3xl">📚</div>
            <div class="font-bold text-gray-800 mt-1">Buku</div>
            <div class="text-xs text-gray-400 mt-0.5">Edukasi & Hiburan</div>
        </div>
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-amber-100 text-center">
            <div class="font-display text-3xl">🍱</div>
            <div class="font-bold text-gray-800 mt-1">Makanan</div>
            <div class="text-xs text-gray-400 mt-0.5">Kuliner Nusantara</div>
        </div>
    </div>
</div>

</body>
</html>
